name: CI/CD Multi-Environment Pipeline

on:
  push:
    branches: [ "develop", "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # =========================================================================
  # ETAPA 1: CALIDAD Y SEGURIDAD (Para develop, main y Pull Requests)
  # =========================================================================
  security-and-quality:
    name: Code Quality & Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # SCA: Detección de Secretos
      - name: Secret Detection (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # SAST: Análisis Estático con SonarQube Cloud
      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # =========================================================================
  # ETAPA 2: AMBIENTE DEV (Modificado con corrección sintaxis Bash)
  # =========================================================================
  deploy-dev:
    name: Build & Publish to DEV (AWS ECR)
    needs: security-and-quality
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Instalamos el binario de Trivy en el runner para usarlo en el script
      - name: Install Trivy CLI
        run: |
          sudo apt-get update && sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.p/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Build, Scan & Push Multi-Service to ECR DEV
        run: |
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          SERVICES=("ui" "admin" "catalog" "carts" "orders" "checkout")
          PATHS=("./src/ui" "./src/admin" "./src/catalog" "./src/cart" "./src/orders" "./src/checkout")

          for i in "${!SERVICES[@]}"; do
            SERVICE="${SERVICES[$i]}"
            REPO_PATH="${PATHS[$i]}"
            IMAGE_URI="$REGISTRY/retail-$SERVICE"

            echo "=== Procesando servicio DEV: $SERVICE ==="

            # 1. Build de la imagen Docker
            docker build -t $IMAGE_URI:latest $REPO_PATH

            # 2. Escaneo de Vulnerabilidades nativo con Trivy CLI
            trivy image --exit-code 1 --ignore-unfixed --vuln-type os,library --severity CRITICAL,HIGH $IMAGE_URI:latest

            # 3. Push de la imagen a AWS ECR
            docker push $IMAGE_URI:latest
            
            # 4. Forzar despliegue para limpiar el 503
            aws ecs update-service --cluster retail-dev-cluster --service retail-$SERVICE --force-new-deployment
          done

  # =========================================================================
  # ETAPA 3: AMBIENTE TEST (Se ejecuta durante el Pull Request a main)
  # =========================================================================
  deploy-test:
    name: Build & Publish to TEST (AWS ECR)
    needs: security-and-quality
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Multi-Service to ECR TEST
        run: |
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          SERVICES=("ui" "admin" "catalog" "carts" "orders" "checkout")
          PATHS=("./src/ui" "./src/admin" "./src/catalog" "./src/cart" "./src/orders" "./src/checkout")

          for i in "${!SERVICES[@]}"; do
            SERVICE="${SERVICES[$i]}"
            REPO_PATH="${PATHS[$i]}"
            IMAGE_URI="$REGISTRY/retail-$SERVICE"

            echo "=== Procesando servicio TEST: $SERVICE ==="
            docker build -t $IMAGE_URI:test-latest $REPO_PATH
            docker push $IMAGE_URI:test-latest
          done

  # =========================================================================
  # ETAPA 4: AMBIENTE PROD (Solo cuando cambia main)
  # =========================================================================
  deploy-prod:
    name: Build & Publish to PROD (AWS ECR)
    needs: security-and-quality
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Multi-Service to ECR PROD
        run: |
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          SERVICES=("ui" "admin" "catalog" "carts" "orders" "checkout")
          PATHS=("./src/ui" "./src/admin" "./src/catalog" "./src/cart" "./src/orders" "./src/checkout")

          for i in "${!SERVICES[@]}"; do
            SERVICE="${SERVICES[$i]}"
            REPO_PATH="${PATHS[$i]}"
            IMAGE_URI="$REGISTRY/retail-$SERVICE"

            echo "=== Procesando servicio PROD: $SERVICE ==="
            docker build -t $IMAGE_URI:prod-latest $REPO_PATH
            docker push $IMAGE_URI:prod-latest
          done